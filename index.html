<script>
(function(){
  const drawer=document.getElementById('drawer');
  function openDrawer(){drawer.classList.add('show');drawer.setAttribute('aria-hidden','false')}
  function closeDrawer(){drawer.classList.remove('show');drawer.setAttribute('aria-hidden','true')}
  document.addEventListener('click',function(e){
    const close=e.target.closest && e.target.closest('#closeBtn,.close');
    if(close){e.preventDefault();e.stopPropagation();closeDrawer();return}
    if(e.target===drawer){e.preventDefault();closeDrawer();return}
    const btn=e.target.closest && e.target.closest('footer.actions .action');
    if(!btn)return;
    e.preventDefault();
    const key=btn.dataset.link;
    if(key==='hub'){openDrawer();return}
    if(key==='timeline') location.href='https://centiger.github.io/cen-bible-chrololgy/?view=timeline';
    if(key==='connect') location.href='https://centiger.github.io/cen-bible-chrololgy/#hub';
    if(key==='overview') location.href='https://centiger.github.io/CEN-Bible2.0/#overview66';
  },true);
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
})();
</script>

<script id="CEN-EARLYCHURCH-SCROLL-LIMIT-V5">
(function(){
  function bottomUiHeight(){
    const flow=document.querySelector('.era-flow-strip');
    const nav=document.querySelector('footer.actions');
    return (flow?flow.offsetHeight:0)+(nav?nav.offsetHeight:0);
  }
  function maxScrollY(){
    const img=document.querySelector('img.bg');
    if(!img) return Math.max(0, document.documentElement.scrollHeight-window.innerHeight);
    const rect=img.getBoundingClientRect();
    const imgBottom=window.scrollY+rect.bottom;
    return Math.max(0, imgBottom-window.innerHeight+bottomUiHeight());
  }
  let ticking=false;
  function clamp(){
    const max=maxScrollY();
    if(window.scrollY>max) window.scrollTo(0,max);
  }
  window.addEventListener('scroll',function(){
    if(ticking)return;
    ticking=true;
    requestAnimationFrame(function(){clamp();ticking=false;});
  },{passive:true});
  window.addEventListener('load',function(){setTimeout(clamp,180)});
  window.addEventListener('resize',clamp);
})();
</script>
